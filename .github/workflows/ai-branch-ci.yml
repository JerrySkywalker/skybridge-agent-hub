name: AI Branch CI

on:
  push:
    branches:
      - "ai/**"

permissions:
  contents: read

jobs:
  ai-branch-validation:
    name: AI branch validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile=false
      - name: Lint, typecheck, test and build
        run: corepack pnpm check
      - name: Check working tree diff whitespace
        run: git diff --check
      - name: Parse PowerShell scripts
        shell: pwsh
        run: ./scripts/powershell/validate-powershell.ps1
      - name: Operator Console smoke
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .agent/ci | Out-Null
          corepack pnpm smoke:operator-console *>&1 | Tee-Object -FilePath .agent/ci/operator-console-smoke.log
      - name: Codex hook integration smoke
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .agent/ci | Out-Null
          ./scripts/powershell/smoke-codex-hook-integration.ps1 -ApiBase http://127.0.0.1:8798 -StartServer *>&1 | Tee-Object -FilePath .agent/ci/codex-hook-integration-smoke.log
      - name: Docker compose dev config
        run: docker compose -f deploy/docker-compose.dev.yml config
      - name: Docker compose test config
        run: docker compose -f deploy/docker-compose.test.yml config
      - name: Upload safe smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-branch-smoke-logs
          path: .agent/ci/*.log
          if-no-files-found: ignore
          retention-days: 7
