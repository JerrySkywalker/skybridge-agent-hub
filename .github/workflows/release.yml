name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Release image tag to validate
        required: false
        default: manual-release

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Release validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.1
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile=false
      - name: Full checks
        run: corepack pnpm check
      - name: Parse PowerShell scripts
        shell: pwsh
        run: ./scripts/powershell/validate-powershell.ps1
      - name: Compose validation
        run: |
          docker compose -f deploy/docker-compose.dev.yml config
          docker compose -f deploy/docker-compose.test.yml config
          docker compose -f deploy/docker-compose.prod.yml config
      - name: Release dry-run smoke
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .agent/ci | Out-Null
          ./scripts/powershell/smoke-release-dry-run.ps1 *>&1 | Tee-Object -FilePath .agent/ci/release-dry-run.log
      - name: Create release notes artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .agent/ci | Out-Null
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "${{ inputs.image_tag }}" }
          @"
          # SkyBridge Agent Hub $tag

          - Full checks passed in release validation.
          - Docker images are built and published by the docker-build job.
          - Run staging dry-run before any real deployment.
          "@ | Set-Content -Encoding UTF8 .agent/ci/release-notes.md
      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-validation-artifacts
          path: |
            .agent/ci/release-dry-run.log
            .agent/ci/release-notes.md
          if-no-files-found: ignore
          retention-days: 14
          include-hidden-files: true

  docker-build:
    name: Publish release image (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        app: [server, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/skybridge-agent-hub-${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=tag
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/dockerfiles/${{ matrix.app }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
