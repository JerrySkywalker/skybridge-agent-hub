name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  project-check:
    name: Project check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.1
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile=false
      - name: Lint, typecheck, test and build
        run: corepack pnpm check
      - name: Check diff whitespace
        run: git diff --check
      - name: Parse PowerShell scripts
        shell: pwsh
        run: ./scripts/powershell/validate-powershell.ps1
      - name: Operator Console smoke
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .agent/ci | Out-Null
          corepack pnpm smoke:operator-console *>&1 | Tee-Object -FilePath .agent/ci/operator-console-smoke.log
      - name: Browser visual QA optional smoke
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .agent/ci | Out-Null
          corepack pnpm smoke:browser-visual-qa *>&1 | Tee-Object -FilePath .agent/ci/browser-visual-qa.log
      - name: Validate browser visual QA artifacts
        if: hashFiles('.agent/tmp/browser-visual-qa/manifest.json') != ''
        shell: pwsh
        run: ./scripts/powershell/assert-browser-visual-qa-artifacts.ps1
      - name: Codex hook fixture smoke
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .agent/ci | Out-Null
          ./scripts/powershell/test-codex-hook-event.ps1 -RequireSpool *>&1 | Tee-Object -FilePath .agent/ci/codex-hook-fixture-smoke.log
      - name: Docker compose dev config
        run: docker compose -f deploy/docker-compose.dev.yml config
      - name: Docker compose test config
        run: docker compose -f deploy/docker-compose.test.yml config
      - name: Upload safe smoke logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pr-ci-smoke-logs
          path: .agent/ci/*.log
          if-no-files-found: ignore
          retention-days: 7
          include-hidden-files: true
      - name: Upload browser visual QA artifacts
        if: always() && hashFiles('.agent/tmp/browser-visual-qa/manifest.json') != ''
        uses: actions/upload-artifact@v6
        with:
          name: pr-ci-browser-visual-qa
          path: .agent/tmp/browser-visual-qa/
          if-no-files-found: error
          retention-days: 7
          include-hidden-files: true
