name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm check
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          foreach ($script in Get-ChildItem scripts/powershell -Filter *.ps1) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$null, [ref]$errors) | Out-Null
            if ($errors) {
              $failed = $true
              Write-Error "$($script.Name) failed PowerShell parse validation."
              $errors | Format-List
            }
          }
          if ($failed) { exit 1 }
      - run: pnpm smoke:operator-console
      - run: docker compose -f deploy/docker-compose.dev.yml config
      - run: docker compose -f deploy/docker-compose.test.yml config
