name: Build Images

on:
  push:
    branches: [ main ]
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [server, web]
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/dockerfiles/${{ matrix.app }}.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/skybridge-agent-hub-${{ matrix.app }}:${{ github.sha }}
