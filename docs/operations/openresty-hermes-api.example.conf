# Example OpenResty server block for the Hermes API only.
# Install manually on the SkyBridge host after DNS and TLS are ready.
# Do not proxy the Hermes Dashboard from this virtual host.

upstream hermes_api_backend {
  server 127.0.0.1:8642;
  keepalive 16;
}

server {
  listen 443 ssl http2;
  server_name api.hermes.example.com;

  ssl_certificate /etc/letsencrypt/live/api.hermes.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.hermes.example.com/privkey.pem;

  # Optional hardening: uncomment after confirming operator source ranges.
  # allow 203.0.113.10;
  # deny all;

  client_max_body_size 4m;

  location / {
    proxy_pass http://hermes_api_backend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Preserve Authorization: Bearer <HERMES_API_KEY>; Hermes remains the API auth gate.
    proxy_set_header Authorization $http_authorization;

    # Planning calls can be slow and may stream response events.
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
    gzip off;

    # SSE/streaming friendliness.
    proxy_set_header Connection "";
    add_header X-Accel-Buffering no always;
  }
}
