# Example OpenResty server block for SkyBridge Agent Hub.
# TLS certificates are expected to be managed by the existing panel/cert manager.
# Do not proxy Hermes API through this public host.

server {
    listen 443 ssl http2;
    server_name skybridge.jerryskywalker.space;

    # ssl_certificate     /path/managed/by/panel/fullchain.pem;
    # ssl_certificate_key /path/managed/by/panel/privkey.pem;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization $http_authorization;

        # SSE and future websocket-friendly settings.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Optional: protect browser/UI routes with Authelia at the proxy layer.
    # Worker API token auth remains enforced by the SkyBridge app on worker-sensitive routes.
}

server {
    listen 80;
    server_name skybridge.jerryskywalker.space;
    return 301 https://$host$request_uri;
}
